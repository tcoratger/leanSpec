[build-system]
requires = ["setuptools>=77.0.3", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lean-ethereum-testing"
version = "0.0.1"
description = "Lean Ethereum client test generation and runner framework"
readme = "README.md"
authors = [
    { name = "Ethereum Foundation", email = "thomas.coratger@ethereum.org" },
]
keywords = ["ethereum", "testing", "consensus", "lean"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
requires-python = ">=3.12"
dependencies = [
    "lean-spec",
    "pydantic>=2.12.0,<3",
    "pytest>=8.3.3,<9",
    "click>=8.1.0,<9",
]

license = {text = "MIT"}

[project.urls]
Homepage = "https://github.com/leanEthereum/lean-spec"
Source = "https://github.com/leanEthereum/lean-spec"
Issues = "https://github.com/leanEthereum/lean-spec/issues"

[project.scripts]
fill = "consensus_testing.cli.fill:fill"
apitest = "consensus_testing.cli.apitest:apitest"
keys = "consensus_testing.keys_cli:keys"

[tool.setuptools.packages.find]
where = ["src"]

# Ship only the committed test-scheme keys.
# Prod-scheme keys are large local downloads and are fetched on demand.
# Why explicit opt-out: the default sweeps every file in package
# directories, including multi-megabyte locally downloaded prod keys.
[tool.setuptools]
include-package-data = false

[tool.setuptools.package-data]
consensus_testing = ["py.typed", "test_keys/test_scheme/*.json", "cli/pytest_ini_files/*.ini"]

[tool.uv.sources]
lean-spec = { workspace = true }
